<!DOCTYPE>
<HTML>

<head>
	<title> enter the number</title>
</head>

<body>
	<script type="text/javascript">
		let a = parseInt(prompt("enter the number you want"));
		document.write("The multiplication table of " + a + " is :<br>");
		var multi;
		for (let i = 1; i <= 10; i++) {

			multi = a * i;


			document.write(a + " * " + i + "  = " + multi + "<br>");

		}
	</script>
</body>

</HTML>
