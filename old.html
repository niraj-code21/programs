<html>
    <head> <title>SUM</title></head>
    <body> <script type="text/javascript">
        var x= Number(prompt("enter the amount"));
        var y= Number(prompt("enter the year"));
        let r=Number(prompt("Enter the Rate(%)"));
        var si= x*y*r/100;
        document.write("The SI of amount: Rs."+x+" for "+y+" years at "+r+"% rate is "+si);
         
    </script>

    </body>
    
</html>
