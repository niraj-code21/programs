<html>

<head>
    <title> CHECK THE NUM</title>
</head>

<body>



    <script type="text/javascript">

        const x = Number(prompt("enter a number"));
        if (x % 2 == 0) {
            alert("The number is even");
        } else {
            alert("The number is odd");
        }
    </script>
</body>

</html>
