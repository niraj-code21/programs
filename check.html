<html>

<head>
    <title> CHECK THE NUM</title>
</head>

<body>
    <form>
        <h1> </h1>
        <labeL>NUMBER:</labeL>
        <input type="text" placeholder="enter here" id="n1" /><br>
        <br><input type="button" value="check" onclick="check()" />

    </form>
    <script type="text/javascript">
        function check() {
            const x = document.getElementById("n1").value;
            if (x % 2 == 0) {
                alert("The number is even");
            } else {
                alert("The number is odd");
            }
        }
    </script>
</body>

</html>
