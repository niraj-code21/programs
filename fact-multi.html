<!DOCTYPE>
<html>

<head>
    <title> FACT-MULTI</title>
</head>

<body>
    <form>
        <label> NUMBER:</label>
        <input type="text" placeholder="Enter Here" id="num1"><br>
        <br> <input type="button" value="MULTIPLICATION" onclick="multi()"><br>
        <br><input type="button" value="FACTORIAL" onclick="fact()">
    </form>
    <script type="text/javascript">

        function multi() {
            var x = Number(document.getElementById("num1").value);
            alert("The Multiplication table of " + x + " is :");

            for (let i = 1; i <= 10; i++) {
                let multi = x * i;
                alert(x + " * " + i + " = " + multi);

            }
        }
        function fact() {
            var x = Number(document.getElementById("num1").value);
            var facti = 1;
            for (let i = 1; i <= x; i++) {
                facti = facti * i;
            }
            alert("The factorial of " + x + " is " + facti);

        }
    </script>
</body>

</html>
